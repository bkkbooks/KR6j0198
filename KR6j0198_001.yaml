body:
  text: 驚覺􅞣􅝑􅞣􅞣驚覺􅞣􅝗􅁥根本􅞣􅝗􅝗􅁥心及隨心隨心坐􅁥結壇界􅁥結十方界碎毗那夜迦􅁥頂髻加持衣洗嗽洗浴􅝝􅁥法護神線獻花􅞣塗香􅞣燒香燈食閼伽供物及食等加持念珠念誦先誦此真言結趺坐􅁥驚覺一切如來􅞣􅁥請一切如來求願􅞣求菩薩願請一切天龍請四天王等加持弟子令弟子入壇􅞣獻一切佛一切菩薩諸天等食訶送諸聖衆􅞣􅋌􅁥獻物護身為弟子灌頂􅞣法供養護摩􅁥􅝕我今悉皆禮􅇟􅁥普遍光明如來心􅞣一切如來心印􅞣一切如來普遍大寶三昧耶􅞣一切如來莊嚴大寶光􅞣金剛師子座􅞣大寶出生灌頂􅞣摧魔熾然法輪神通加持􅞣無能勝􅞣一切如來轉法輪􅞣金剛手􅞣寶金剛菩薩􅁥四大天主吉祥天女鈎棄尼天女使者天女曼荼羅中一切聖衆花齒天女承安元年六月十日於仁和寺以常林房御本書寫本云以根本御本書之云云金剛顯耀
